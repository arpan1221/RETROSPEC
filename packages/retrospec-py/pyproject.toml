[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "retrospec"
version = "0.1.0"
description = "Query the RETROSPEC AI history knowledge graph — events, people, models, and concepts spanning 1305 to 2026"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = ["thefuzz>=0.22.0"]
keywords = ["ai", "history", "knowledge-graph", "machine-learning", "retrospec"]

[project.urls]
Homepage = "https://github.com/arpan1221/RETROSPEC"
