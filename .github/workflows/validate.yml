name: Validate RETROSPEC Data

on:
  pull_request:
    paths:
      - '**/*.json'

jobs:
  validate:
    name: Schema Validation & Integrity Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r tools/validate/requirements.txt

      - name: Run schema validation
        run: python tools/validate/validate.py all

      - name: Run referential integrity check
        run: python tools/validate/check_integrity.py
