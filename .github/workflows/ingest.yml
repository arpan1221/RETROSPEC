name: Auto-Ingest

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run ingest scripts
        run: cd tools/ingest && npm install && npm run ingest

      - name: Commit and push proposals
        run: |
          count=$(find _bmad-output/ingest-proposals -name '*.json' 2>/dev/null | wc -l)
          echo "Found $count proposals"
          if [ "$count" -gt "0" ]; then
            git config user.name "RETROSPEC Bot"
            git config user.email "bot@retrospec.dev"

            # Fetch latest and rebase any local changes
            git fetch origin main
            git rebase origin/main || git rebase --abort

            # Stage and commit
            git add _bmad-output/ingest-proposals/
            if git diff --cached --quiet; then
              echo "No new changes to commit"
            else
              git commit -m "feat: Auto-ingest found new proposals [skip ci]"

              # Retry push up to 3 times with pull
              for i in 1 2 3; do
                git push origin main && break
                echo "Push failed, pulling and retrying ($i/3)..."
                git pull --rebase origin main
              done
            fi
          fi
