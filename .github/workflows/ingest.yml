name: Auto-Ingest

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run ingest scripts
        run: cd tools/ingest && npm install && npm run ingest

      - name: Commit and push proposals
        run: |
          git config user.name "RETROSPEC Bot"
          git config user.email "bot@retrospec.dev"

          # Stage all proposal changes
          git add _bmad-output/ingest-proposals/

          # Check if there's anything to commit
          if git diff --cached --quiet; then
            echo "No new changes to commit"
            exit 0
          fi

          # Commit locally
          git commit -m "feat: Auto-ingest proposals [skip ci]"

          # Pull latest remote changes, rebase our commit on top
          git pull --rebase origin main

          # Push
          git push origin main
